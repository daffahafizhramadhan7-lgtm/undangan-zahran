<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Link Generator - Undangan Zahran</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 border border-stone-200/60 space-y-6">
        <div class="text-center">
            <h1 class="text-xl font-bold text-[#1B4235]">WhatsApp Link Generator</h1>
            <p class="text-xs text-stone-500 mt-1">Kirim undangan khitanan Zahran secara otomatis tanpa ribet ubah link manual</p>
        </div>

        <form id="inviteForm" class="space-y-4">
            <!-- Input Nama Tamu -->
            <div>
                <label class="block text-xs font-semibold text-stone-600 uppercase tracking-wider mb-1">Nama Tamu</label>
                <input type="text" id="guestName" placeholder="Contoh: Om Heri Sekeluarga" required
                       class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none focus:border-[#1B4235] text-sm transition-all">
            </div>

            <!-- Input Nomor WA -->
            <div>
                <label class="block text-xs font-semibold text-stone-600 uppercase tracking-wider mb-1">Nomor WhatsApp Tamu</label>
                <input type="tel" id="guestPhone" placeholder="Contoh: 08123456789 atau 62812..." required
                       class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none focus:border-[#1B4235] text-sm transition-all">
                <span class="text-[10px] text-stone-400 mt-1 block">Bisa diawali angka 0 atau 62 (Otomatis dikonversi)</span>
            </div>

            <!-- Tombol Kirim -->
            <button type="submit" 
                    class="w-full bg-[#1B4235] text-[#D4AF37] font-bold py-3.5 rounded-xl shadow-lg hover:brightness-110 transition-all text-xs tracking-widest cursor-pointer flex items-center justify-center gap-2">
                🚀 KIRIM VIA WHATSAPP
            </button>
        </form>
    </div>

    <script>
        document.getElementById('inviteForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // 1. Ambil input data
            const name = document.getElementById('guestName').value.trim();
            let phone = document.getElementById('guestPhone').value.trim();

            // 2. Format nomor HP agar sesuai standar WhatsApp API (62)
            if (phone.startsWith('0')) {
                phone = '62' + phone.substring(1);
            } else if (phone.startsWith('+62')) {
                phone = phone.substring(1);
            } else if (!phone.startsWith('62')) {
                phone = '62' + phone;
            }
            phone = phone.replace(/[- ]/g, '');

            // 3. Ambil URL dasar secara otomatis
            const baseUrl = window.location.origin;
            const invitationUrl = baseUrl + '/?tamu=' + encodeURIComponent(name);

            // 4. Susun template pesan teks murni tanpa format markdown pembungkus link
            const textMessage = "Assalamu'alaikum Wr. Wb.\n\nTanpa mengurangi rasa hormat, perkenankan kami mengundang Bapak/Ibu/Saudara/i *" + name + "* untuk menghadiri acara tasyakuran khitanan putra kami, *Fakhri Zahran Khoiry (Zahran)*.\n\nDetail info acara silakan buka link undangan digital berikut:\n" + invitationUrl + "\n\nMerupakan suatu kehormatan dan kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan hadir. Terima kasih banyak atas perhatiannya.\n\nWassalamu'alaikum Wr. Wb.";

            // 5. Generate Link WA API & langsung redirect
            const waUrl = "https://api.whatsapp.com/send?phone=" + phone + "&text=" + encodeURIComponent(textMessage);
            window.open(waUrl, '_blank');
        });
    </script>
</body>
</html>
